server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Relative redirects so the trailing-slash 301 preserves host:port (matters on non-standard ports).
    absolute_redirect off;

    # Static assets
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Thin CORS pass-through proxy for the gov.uk Content API.
    # /api/advice/<country> -> https://www.gov.uk/api/content/foreign-travel-advice/<country>
    location ~ ^/api/advice/(?<country>[a-z-]+)$ {
        resolver 1.1.1.1 8.8.8.8 valid=300s;
        set $upstream "https://www.gov.uk/api/content/foreign-travel-advice/$country";

        proxy_pass $upstream;
        proxy_ssl_server_name on;
        proxy_set_header Host www.gov.uk;
        proxy_set_header User-Agent "passport-valid (gov.uk content proxy)";
        proxy_set_header Accept "application/json";

        proxy_hide_header Set-Cookie;
        proxy_hide_header Access-Control-Allow-Origin;
        add_header Access-Control-Allow-Origin "*" always;
        add_header Cache-Control "public, max-age=21600" always;
    }
}
