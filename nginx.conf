server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Relative redirects so the trailing-slash 301 preserves host:port (matters on non-standard ports).
    absolute_redirect off;

    # Security headers (parity with the Cloudflare Pages _headers file).
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=(), interest-cohort=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://clicks.bowlerdesign.co.uk; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data:; connect-src 'self' https://clicks.bowlerdesign.co.uk; base-uri 'self'; form-action 'self'; frame-ancestors 'none'; object-src 'none'" always;

    # Static assets
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Thin CORS pass-through proxy for the gov.uk Content API.
    # /api/advice/<country> -> https://www.gov.uk/api/content/foreign-travel-advice/<country>
    location ~ ^/api/advice/(?<country>[a-z-]+)$ {
        resolver 1.1.1.1 8.8.8.8 valid=300s;
        set $upstream "https://www.gov.uk/api/content/foreign-travel-advice/$country";

        proxy_pass $upstream;
        proxy_ssl_server_name on;
        proxy_set_header Host www.gov.uk;
        proxy_set_header User-Agent "passport-valid (gov.uk content proxy)";
        proxy_set_header Accept "application/json";

        proxy_hide_header Set-Cookie;
        proxy_hide_header Access-Control-Allow-Origin;
        # No CORS header: the frontend calls this same-origin, so no other site can read it.
        add_header Cache-Control "public, max-age=21600" always;
    }
}
